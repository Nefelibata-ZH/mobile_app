name: mobile_app
description: A Flutter expense tracker app built with Riverpod, Hive, and Material 3.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Routing
  go_router: ^14.2.0

  # UI / Charts
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0

  # Voice journaling: on-device speech-to-text + secure storage for the
  # OpenAI API key + http client for the chat-completions call.
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
